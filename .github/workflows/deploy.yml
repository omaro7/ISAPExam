name: Deploy ISAPExam to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GOMS_EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.GOMS_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist to EC2
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/ec2_key" dist/ ${{ secrets.GOMS_EC2_USER }}@${{ secrets.GOMS_EC2_HOST }}:/var/www/isapexam/

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.GOMS_EC2_USER }}@${{ secrets.GOMS_EC2_HOST }} "sudo systemctl reload nginx"